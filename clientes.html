<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Rutas — Clientes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CRM Rutas">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="page-header">
    <h1 style="flex:1">Clientes</h1>
    <button class="btn btn-primary btn-sm" id="btnNuevoCliente">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo
    </button>
  </div>

  <div class="container">
    <!-- Buscador -->
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="buscador" class="form-control" placeholder="Buscar por nombre o código...">
    </div>

    <!-- Lista clientes -->
    <div id="listaClientes">
      <div class="loader"><div class="spinner"></div> Cargando...</div>
    </div>
  </div>

  <!-- Modal Nuevo/Editar Cliente -->
  <div class="modal-overlay" id="overlayCliente">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="modalTitulo">Nuevo cliente</h2>
        <button class="btn-icon" id="btnCerrarModal">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="formCliente">
        <div class="form-group">
          <label for="fCodigo">Código cliente *</label>
          <input type="text" id="fCodigo" class="form-control" placeholder="C001" required>
        </div>
        <div class="form-group">
          <label for="fNombre">Nombre *</label>
          <input type="text" id="fNombre" class="form-control" placeholder="Nombre del establecimiento" required>
        </div>
        <div class="form-group">
          <label for="fTelefono">Teléfono</label>
          <input type="tel" id="fTelefono" class="form-control" placeholder="6XX XXX XXX">
        </div>
        <div class="form-group">
          <div class="toggle-wrap">
            <span class="toggle-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.45 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
              Cliente telefónico
            </span>
            <label class="toggle" style="margin-left:auto">
              <input type="checkbox" id="fEsTelefono">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <p class="text-muted" style="font-size:.72rem;margin-top:6px;padding-left:2px">Pasa el pedido por teléfono, no requiere visita presencial</p>
        </div>
        <div class="form-group">
          <div class="toggle-wrap">
            <span class="toggle-label">🍺 Cliente de cerveza</span>
            <label class="toggle" style="margin-left:auto">
              <input type="checkbox" id="fEsCerveza">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <p class="text-muted" style="font-size:.72rem;margin-top:6px;padding-left:2px">Sus ventas no cuentan en los totales económicos. Solo se contabiliza si compra o no cada mes.</p>
        </div>
        <div class="form-group">
          <label>Días de visita / pedido</label>
          <div class="days-group">
            <input type="checkbox" class="day-check" id="fDia_lunes"     value="lunes">
            <label class="day-label" for="fDia_lunes">Lunes</label>
            <input type="checkbox" class="day-check" id="fDia_martes"    value="martes">
            <label class="day-label" for="fDia_martes">Martes</label>
            <input type="checkbox" class="day-check" id="fDia_miercoles" value="miercoles">
            <label class="day-label" for="fDia_miercoles">Miércoles</label>
            <input type="checkbox" class="day-check" id="fDia_jueves"    value="jueves">
            <label class="day-label" for="fDia_jueves">Jueves</label>
          </div>
        </div>
        <div class="form-group">
          <label for="fNotas">Notas</label>
          <textarea id="fNotas" class="form-control" placeholder="Observaciones, horarios, preferencias..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btnGuardarCliente">
          Guardar
        </button>
      </form>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </a>
    <a href="rutero.html"   class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Rutero
    </a>
    <a href="clientes.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a href="visita.html"   class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Visita
    </a>
    <a href="historial.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Historial
    </a>
  </nav>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/clientes.js"></script>
  <script>
    iniciarClientes();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
