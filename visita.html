<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Rutas — Registrar Visita</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CRM Rutas">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="page-header">
    <h1>Registrar visita</h1>
  </div>

  <div class="container">
    <form id="formVisita">

      <!-- Cliente -->
      <div class="form-group">
        <label for="clienteSearchInput">Cliente *</label>
        <div class="select-search" id="clienteCombo">
          <input type="text" id="clienteSearchInput" class="form-control"
                 placeholder="— Selecciona o busca cliente —" autocomplete="off">
          <div class="select-dropdown" id="clienteDropdown"></div>
        </div>
        <input type="hidden" id="selectCliente">
      </div>

      <!-- Fecha -->
      <div class="form-group">
        <label for="fFecha">Fecha *</label>
        <input type="date" id="fFecha" class="form-control" required>
      </div>

      <!-- ¿Compró? -->
      <div class="form-group">
        <div class="toggle-wrap">
          <span class="toggle-label" id="labelCompro">¿Compró?</span>
          <label class="toggle" style="margin-left:auto">
            <input type="checkbox" id="toggleCompro">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Aviso cliente cerveza (visible solo cuando aplica) -->
      <div id="notaCerveza" style="display:none;
           background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);
           border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:.8rem;color:#ca8a04">
        🍺 Cliente cerveza
      </div>

      <!-- Importe de la venta -->
      <div class="form-group">
        <label for="fImporte">Importe de la venta (€)</label>
        <input type="number" id="fImporte" class="form-control" placeholder="0.00" step="0.01">
      </div>

      <!-- Notas -->
      <div class="form-group">
        <label for="fNotasVisita">Notas de la visita</label>
        <textarea id="fNotasVisita" class="form-control" placeholder="Observaciones, incidencias, acuerdos..."></textarea>
      </div>

      <div style="height:8px"></div>

      <button type="submit" class="btn btn-primary btn-full" id="btnGuardarVisita">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Guardar visita
      </button>

    </form>

    <!-- Accesos rápidos -->
    <div class="divider"></div>
    <p class="section-title">Accesos rápidos</p>
    <div class="flex gap-8">
      <a href="index.html" class="btn btn-ghost btn-sm" style="flex:1">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Ver ruta del día
      </a>
      <a href="historial.html" class="btn btn-ghost btn-sm" style="flex:1">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Ver historial
      </a>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html"    class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </a>
    <a href="rutero.html"   class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Rutero
    </a>
    <a href="clientes.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a href="visita.html"   class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Visita
    </a>
    <a href="historial.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Historial
    </a>
  </nav>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/visitas.js"></script>
  <script>
    iniciarVisita();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
