<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Línea de ruta (dashed) -->
  <line x1="9" y1="24" x2="23" y2="8"
        stroke="#2563eb" stroke-width="2"
        stroke-linecap="round" stroke-dasharray="2.5 2.5" opacity=".6"/>

  <!-- Parada 1 (inicio, abajo) -->
  <circle cx="9" cy="24" r="4.5" fill="url(#dot)"/>
  <circle cx="9" cy="24" r="2"   fill="white" opacity=".9"/>

  <!-- Parada 2 (intermedia) -->
  <circle cx="16" cy="16" r="3.2" fill="#3b82f6" opacity=".75"/>
  <circle cx="16" cy="16" r="1.4" fill="white" opacity=".7"/>

  <!-- Parada 3 (destino, arriba) -->
  <circle cx="23" cy="8" r="4.5" fill="url(#dot)"/>
  <circle cx="23" cy="8" r="2"   fill="white" opacity=".9"/>
</svg>
