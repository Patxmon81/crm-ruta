<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Rutas — Historial</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CRM Rutas">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="page-header">
    <h1>Historial</h1>
  </div>

  <div class="container">

    <!-- Tabs: Por mes / Por cliente -->
    <div class="tab-bar" style="margin-bottom:16px">
      <button class="tab-btn active" id="tabMeses"    onclick="cambiarVista('meses')">Por mes</button>
      <button class="tab-btn"        id="tabCliente"  onclick="cambiarVista('cliente')">Por cliente</button>
    </div>

    <!-- Vista: Por mes -->
    <div id="vistaMeses">
      <div class="loader"><div class="spinner"></div> Cargando...</div>
    </div>

    <!-- Vista: Por cliente -->
    <div id="vistaCliente" style="display:none">
      <div class="form-group">
        <label for="selectClienteHistorial">Selecciona un cliente</label>
        <select id="selectClienteHistorial" class="form-control">
          <option value="">Cargando clientes...</option>
        </select>
      </div>
      <div id="historialContenido"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html"     class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </a>
    <a href="rutero.html"    class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Rutero
    </a>
    <a href="clientes.html"  class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a href="visita.html"    class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Visita
    </a>
    <a href="historial.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Historial
    </a>
  </nav>

  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/visitas.js"></script>
  <script>

    let vistaActual = 'meses';
    let clientesCargados = false;

    // ── Tabs ──────────────────────────────────────────────
    function cambiarVista(vista) {
      vistaActual = vista;
      document.getElementById('tabMeses').classList.toggle('active',   vista === 'meses');
      document.getElementById('tabCliente').classList.toggle('active', vista === 'cliente');
      document.getElementById('vistaMeses').style.display   = vista === 'meses'   ? 'block' : 'none';
      document.getElementById('vistaCliente').style.display = vista === 'cliente' ? 'block' : 'none';

      if (vista === 'cliente' && !clientesCargados) {
        clientesCargados = true;
        iniciarHistorial();
      }
    }

    // ── Vista por mes ─────────────────────────────────────
    async function cargarHistoricoMeses() {
      const contenido = document.getElementById('vistaMeses');
      contenido.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
      try {
        const meses = await dbGetHistoricoMeses(12);
        renderMeses(meses);
      } catch(e) {
        contenido.innerHTML = `<div class="loader" style="color:var(--danger)">${e.message}</div>`;
      }
    }

    function renderMeses(meses) {
      const contenido = document.getElementById('vistaMeses');

      if (!meses.length) {
        contenido.innerHTML = `<div class="empty-state"><p>Sin datos de ventas aún.</p></div>`;
        return;
      }

      const maxTotal = Math.max(...meses.map(m => Math.max(m.total, m.objetivo || 0)), 1);

      contenido.innerHTML = `
        <div style="margin-bottom:12px;display:flex;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="cargarHistoricoMeses()">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Actualizar
          </button>
        </div>

        <div class="item-list">
          ${meses.map(m => {
            const pct     = m.objetivo > 0 ? Math.min(Math.round(m.total / m.objetivo * 100), 200) : null;
            const barW    = Math.round(m.total / maxTotal * 100);
            const objW    = m.objetivo > 0 ? Math.min(Math.round(m.objetivo / maxTotal * 100), 100) : 0;
            const color   = pct === null ? 'var(--accent)'
                          : pct >= 100  ? 'var(--success)'
                          : pct >= 75   ? 'var(--accent)'
                          : 'var(--warning)';
            const badge   = pct !== null
              ? `<span class="chip" style="background:${pct >= 100 ? 'rgba(34,197,94,.15)' : 'rgba(59,130,246,.12)'};
                   color:${color};font-size:.7rem;white-space:nowrap">${pct}%</span>`
              : '';

            return `
              <div class="card" style="padding:14px;margin-bottom:0">
                <!-- Cabecera -->
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap">
                  <div style="min-width:0">
                    <span style="font-weight:700;font-size:.9rem;text-transform:capitalize;word-break:break-word">
                      ${m.esMesActual ? '📅 ' : ''}${m.nombre}
                    </span>
                    ${m.esMesActual ? '<span class="chip chip-muted" style="font-size:.6rem;margin-left:4px">Actual</span>' : ''}
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                    ${badge}
                    <span style="font-size:clamp(.85rem,4vw,1.05rem);font-weight:700">${formatImporte(m.total)}</span>
                  </div>
                </div>

                <!-- Barra de ventas -->
                <div style="background:var(--bg);border-radius:4px;height:8px;overflow:hidden;position:relative;margin-bottom:4px">
                  <div style="height:100%;width:${barW}%;background:${color};border-radius:4px;transition:width .5s"></div>
                  ${objW > 0 ? `<div style="position:absolute;top:0;bottom:0;left:${objW}%;
                    width:2px;background:var(--text-muted);opacity:.5"></div>` : ''}
                </div>

                <!-- Objetivo -->
                <div style="display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--text-muted)">
                  <div style="display:flex;align-items:center;gap:6px">
                    <span>🎯 Objetivo:</span>
                    <span style="font-weight:600;color:var(--text)">
                      ${m.objetivo > 0 ? formatImporte(m.objetivo) : '—'}
                    </span>
                    <button onclick="editarObjetivoMes('${m.mesISO}','${escHtml(m.nombre)}')"
                      style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;line-height:1">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                      </svg>
                    </button>
                  </div>
                  ${m.objetivo > 0 && m.total < m.objetivo
                    ? `<span style="color:var(--warning)">Falta ${formatImporte(m.objetivo - m.total)}</span>`
                    : m.objetivo > 0
                    ? `<span style="color:var(--success)">✓ Objetivo superado</span>`
                    : ''}
                </div>
              </div>`;
          }).join('')}
        </div>`;
    }

    function editarObjetivoMes(mesISO, mesNombre) {
      const actual = dbGetObjetivo(mesISO);
      const val    = prompt(`Objetivo para ${mesNombre} (€):`, actual > 0 ? actual : '');
      if (val === null) return;
      const num = parseFloat(String(val).replace(',', '.'));
      if (isNaN(num) || num < 0) { showToast('Valor no válido', 'error'); return; }
      dbSetObjetivo(mesISO, num);
      showToast('Objetivo guardado');
      cargarHistoricoMeses();
    }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Arrancar por la vista de meses
    cargarHistoricoMeses();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
